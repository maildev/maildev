packages:
  - 'packages/*'
overrides:
  # Dedupe fastify to a single version: the ui peer dep otherwise resolves to an
  # older 5.7.x than api's, which both breaks type-checking (two FastifyInstance
  # identities) and leaves the older copy on a pre-5.7.3 (vulnerable) release.
  fastify: ^5.10.0
  # hono is only a peer dep of @hono/node-server (pulled in transitively by the
  # MCP SDK), so nothing pins it — force the patched line. See GHSA advisories.
  hono: 4.12.28
  '@hono/node-server': ^1.19.10
  # @types/smtp-server transitively pulls @types/nodemailer@6.4.20+, which wrongly
  # declares @aws-sdk/client-ses as a runtime dep (DefinitelyTyped regression),
  # dragging in the entire aws-sdk tree (incl. the critical fast-xml-parser CVE).
  # Pin to the last release before that regression.
  '@types/nodemailer': 6.4.17
  # Deep transitive advisories in shipped deps. All same-major, backward-compatible
  # patch/minor bumps forced to their fixed releases:
  #   qs / path-to-regexp -> via the MCP SDK's bundled Express 5 HTTP transport
  #   fast-uri / ajv       -> via fastify's JSON-schema compiler
  #   ws / socket.io-parser -> via socket.io + socket.io-client
  qs: ^6.14.2
  path-to-regexp: ^8.4.0
  fast-uri: ^3.1.1
  # Only the 8.x copy (fastify's schema compiler) is vulnerable — must NOT touch
  # eslint's ajv 6.x, whose API is incompatible with 8.x.
  ajv@8: ^8.18.0
  ws: ^8.20.1
  socket.io-parser: ^4.2.6
  # Dev-only build/test toolchain (glob, eslint, vite, sass, babel chains — never
  # published). Version-keyed entries bump ONLY the vulnerable major so newer
  # copies keep their own API; plain entries have a single major in the tree.
  minimatch@3: ^3.1.3
  minimatch@9: ^9.0.7
  picomatch@2: ^2.3.2
  picomatch@4: ^4.0.4
  brace-expansion@1: ^1.1.13
  brace-expansion@2: ^2.0.3
  js-yaml@3: ^3.15.0
  js-yaml@4: ^4.1.2
  flatted: ^3.4.0
  rollup: ^4.59.0
  postcss: ^8.5.10
  immutable: ^5.1.5
  '@babel/core': ^7.29.1
allowBuilds:
  '@parcel/watcher': false
  esbuild: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.4'
  - '@turbo/darwin-arm64@2.10.4'
  - '@turbo/linux-64@2.10.4'
  - '@turbo/linux-arm64@2.10.4'
  - '@turbo/windows-64@2.10.4'
  - '@turbo/windows-arm64@2.10.4'
  - '@vitest/coverage-v8@3.2.7'
  - '@vitest/expect@3.2.7'
  - '@vitest/mocker@3.2.7'
  - '@vitest/pretty-format@3.2.7'
  - '@vitest/runner@3.2.7'
  - '@vitest/snapshot@3.2.7'
  - '@vitest/spy@3.2.7'
  - '@vitest/utils@3.2.7'
  - turbo@2.10.4
  - vitest@3.2.7
  - hono@4.12.28
